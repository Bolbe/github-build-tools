name: Shared Qt Windows Build

on:
  workflow_call:
    inputs:
      exe_name:
        required: true
        type: string
      artifact_name:
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source 
        uses: actions/checkout@v4

      - name: Checkout shared tools
        uses: actions/checkout@v4
        with:
          repository: Bolbe/github-build-tools
          path: build-tools

      - name: Download MinGW 
        working-directory: ${{ runner.temp }} 
        shell: pwsh 
        run: | 
          curl.exe -L -o mingw.7z https://github.com/cristianadam/mingw-builds/releases/download/v11.2.0-rev3/x86_64-11.2.0-release-posix-seh-rt_v9-rev3.7z
          7z x mingw.7z
          
      - name: Download Qt 
        working-directory: ${{ runner.temp }} 
        shell: pwsh 
        run: | 
          curl.exe -L -o QtMingw64.7z http://89.47.50.20/Qt-precompiled/QtMingw64.7z
          7z x QtMingw64.7z

      - name: Build project
        working-directory: ${{ github.workspace }}
        shell: pwsh
        env:
          QT_PATH: ${{ runner.temp }}/QtMingw64
          MINGW_PATH: ${{ runner.temp }}/mingw64
        run: ./build-tools/scripts/build-windows.ps1 ${{ inputs.exe_name }} ${{ inputs.artifact_name }}
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmldemo-windows
          path: ${{ github.workspace }}\qmldemo

